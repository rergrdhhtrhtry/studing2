<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景圆形 -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)"/>
  
  <!-- 闹钟外圈 -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="white" stroke-width="12"/>
  
  <!-- 时钟刻度 -->
  <g stroke="white" stroke-width="4" stroke-linecap="round">
    <line x1="256" y1="86" x2="256" y2="106"/>
    <line x1="256" y1="406" x2="256" y2="426"/>
    <line x1="86" y1="256" x2="106" y2="256"/>
    <line x1="406" y1="256" x2="426" y2="256"/>
    
    <line x1="129" y1="129" x2="143" y2="143"/>
    <line x1="369" y1="369" x2="383" y2="383"/>
    <line x1="383" y1="129" x2="369" y2="143"/>
    <line x1="143" y1="369" x2="129" y2="383"/>
  </g>
  
  <!-- 时针 -->
  <line x1="256" y1="256" x2="256" y2="150" stroke="white" stroke-width="10" stroke-linecap="round"/>
  
  <!-- 分针 -->
  <line x1="256" y1="256" x2="330" y2="200" stroke="white" stroke-width="8" stroke-linecap="round"/>
  
  <!-- 中心点 -->
  <circle cx="256" cy="256" r="15" fill="white"/>
  
  <!-- 闹钟顶部铃铛 -->
  <ellipse cx="180" cy="100" rx="30" ry="20" fill="white"/>
  <ellipse cx="332" cy="100" rx="30" ry="20" fill="white"/>
  
  <!-- 闹钟顶部连接 -->
  <rect x="240" y="50" width="32" height="40" rx="5" fill="white"/>
</svg>